<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntra Transcriber</title>
    <style>
        :root {
            --accent: #0066ff;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text-main: #1a1c1e;
            --text-sub: #5f6368;
            --border: #e0e2e6;
            --red: #ff3b30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .canvas {
            background: var(--card);
            width: 100%;
            max-width: 800px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
        }

        .header {
            padding: 2rem 2.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0;
        }

        .status-pill {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }

        .offline { background: #fee2e2; color: #991b1b; }
        .online { background: #dcfce7; color: #166534; }

        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .offline .dot { background: #ef4444; }
        .online .dot { background: #22c55e; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .setup-overlay {
            padding: 1.5rem 2.5rem;
            background: #f1f3f4;
            border-bottom: 1px solid var(--border);
            display: block;
        }

        .setup-overlay.hidden { display: none; }

        code {
            background: #202124;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: "SF Mono", "Consolas", monospace;
            font-size: 0.85rem;
            display: inline-block;
            margin-right: 10px;
        }

        .btn-copy {
            background: none;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .editor-container {
            flex: 1;
            padding: 0 2.5rem;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        #transcriptArea {
            flex: 1;
            width: 100%;
            border: none;
            resize: none;
            font-size: 1.25rem;
            line-height: 1.6;
            color: var(--text-main);
            outline: none;
            padding: 1rem 0;
            font-family: inherit;
            overflow-y: auto;
            min-height: 0;
        }

        #transcriptArea::placeholder { color: #bdc1c6; }

        .toolbar {
            padding: 1.5rem 2.5rem 2.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .controls-main {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn-record {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(0,102,255,0.2);
        }

        .btn-record:hover { transform: scale(1.05); }
        .btn-record:active { transform: scale(0.95); }
        .btn-record svg { width: 24px; height: 24px; fill: currentColor; }

        .btn-record.recording {
            background: var(--red);
            animation: recording-pulse 1.5s infinite;
        }

        @keyframes recording-pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 59, 48, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        .message {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-sub);
        }

        .actions-secondary {
            display: flex;
            gap: 8px;
        }

        .btn-sec {
            background: none;
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-main);
            transition: background 0.2s;
        }

        .btn-sec:hover { background: #f1f3f4; }
        .btn-sec:disabled { opacity: 0.3; cursor: not-allowed; }

        .youtube-bar {
            padding: 0.75rem 2.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .youtube-bar input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .youtube-bar input:focus { border-color: var(--accent); }

        .btn-yt {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s;
        }

        .btn-yt:hover { opacity: 0.9; }
        .btn-yt:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-record:disabled {
            background: #c4c7cc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-record:disabled:hover { transform: none; }

        .status-bar {
            padding: 0 2.5rem;
            display: none;
        }

        .status-bar.active { display: block; }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .status-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-sub);
        }

        .status-pct {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: #e8eaed;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-fill.indeterminate {
            width: 30%;
            animation: indeterminate 1.5s infinite ease-in-out;
        }

        @keyframes indeterminate {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        /* ── Restore banner ── */
        .restore-banner {
            padding: 10px 2.5rem;
            background: #eff6ff;
            border-bottom: 1px solid #bfdbfe;
            display: none;
            align-items: center;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #1e40af;
            font-weight: 500;
        }

        .restore-banner.active { display: flex; }

        .restore-banner .restore-actions {
            display: flex;
            gap: 8px;
        }

        .restore-banner button {
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid #93c5fd;
            background: white;
            color: #1e40af;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .restore-banner button.restore-primary {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        /* ── Save dialog modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 28px 32px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .modal h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0 0 20px;
        }

        .modal label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-sub);
            margin-bottom: 6px;
        }

        .modal input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

        .modal input:focus { border-color: var(--accent); }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 8px;
        }

        .modal-actions button {
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-actions .btn-cancel {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .modal-actions .btn-save {
            background: var(--accent);
            color: white;
            border: none;
        }

        /* ── Annotation system ── */
        #transcriptArea[contenteditable] {
            white-space: pre-wrap;
            word-wrap: break-word;
            cursor: text;
        }

        #transcriptArea:empty::before {
            content: attr(data-placeholder);
            color: #bdc1c6;
            pointer-events: none;
        }

        mark.ann {
            background: #fef08a;
            color: #713f12;
            border-radius: 3px;
            padding: 0 2px;
            cursor: pointer;
        }

        .btn-sec.ann-active {
            background: #fef08a;
            border-color: #eab308;
            color: #713f12;
        }

    </style>
</head>
<body>

<div class="canvas">
    <div class="header">
        <h1>Syntra Transcriber</h1>
        <div id="serverStatus" class="status-pill offline">
            <div class="dot"></div>
            <span>Bridge Offline</span>
        </div>
    </div>

    <div id="setupOverlay" class="setup-overlay">
        <code id="cmdCode">python server.py</code>
        <button class="btn-copy" onclick="copyCommand()">Copy Command</button>
    </div>

    <!-- Restore banner (shown when a draft is recovered from localStorage) -->
    <div id="restoreBanner" class="restore-banner">
        <span>Previous transcript recovered.</span>
        <div class="restore-actions">
            <button class="restore-primary" onclick="acceptRestore()">Keep</button>
            <button onclick="dismissRestore()">Discard</button>
        </div>
    </div>

    <div class="youtube-bar">
        <input type="text" id="ytUrl" placeholder="Paste a YouTube link to transcribe...">
        <button id="ytBtn" class="btn-yt">Transcribe</button>
    </div>

    <div id="statusBar" class="status-bar">
        <div class="status-header">
            <span id="statusLabel" class="status-label"></span>
            <span id="statusPct" class="status-pct"></span>
        </div>
        <div class="progress-track">
            <div id="progressFill" class="progress-fill"></div>
        </div>
    </div>

    <div class="editor-container">
        <div id="transcriptArea" contenteditable="true" data-placeholder="Start speaking or paste a YouTube link..." spellcheck="false"></div>
    </div>


    <div class="toolbar">
        <div class="controls-main">
            <button id="recordBtn" class="btn-record" title="Start Recording">
                <svg id="icon-mic" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                <svg id="icon-stop" style="display:none" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
            </button>
        </div>

        <div class="actions-secondary">
            <button id="annBtn" class="btn-sec" title="Toggle highlight mode">Annotate</button>
            <button id="saveBtn" class="btn-sec" disabled>Save</button>
            <button id="clearBtn" class="btn-sec">Clear</button>
        </div>
    </div>
</div>

<!-- Save dialog modal -->
<div id="saveModal" class="modal-overlay">
    <div class="modal">
        <h2>Save Transcript</h2>
        <label for="saveFilename">Filename</label>
        <input type="text" id="saveFilename" placeholder="transcript_20260317_120000.txt">
        <label for="saveDirectory">Directory</label>
        <input type="text" id="saveDirectory" placeholder="C:\Codex\Kalima\data\transcripts">
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeSaveModal()">Cancel</button>
            <button class="btn-save" onclick="confirmSave()">Save</button>
        </div>
    </div>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    const recordBtn = document.getElementById('recordBtn');
    const micIcon = document.getElementById('icon-mic');
    const stopIcon = document.getElementById('icon-stop');
    const saveBtn = document.getElementById('saveBtn');
    const clearBtn = document.getElementById('clearBtn');
    const transcriptArea = document.getElementById('transcriptArea');
    const serverStatus = document.getElementById('serverStatus');
    const setupOverlay = document.getElementById('setupOverlay');

    // Status bar elements
    const statusBar = document.getElementById('statusBar');
    const statusLabel = document.getElementById('statusLabel');
    const statusPct = document.getElementById('statusPct');
    const progressFill = document.getElementById('progressFill');

    // Save modal elements
    const saveModal = document.getElementById('saveModal');
    const saveFilenameInput = document.getElementById('saveFilename');
    const saveDirectoryInput = document.getElementById('saveDirectory');

    // Current job tracking (for reconnection)
    let currentJobId = null;
    let defaultSaveDir = '';

    // ── Helper: get/set text for contenteditable ──
    function getPlainText() {
        return transcriptArea.textContent || '';
    }

    function setPlainText(text) {
        // NEVER wipe annotations — if marks exist, only update unmarked text
        const marks = transcriptArea.querySelectorAll('mark.ann');
        if (marks.length > 0) return; // preserve annotations
        transcriptArea.textContent = text;
    }

    function appendText(text) {
        transcriptArea.appendChild(document.createTextNode(text));
    }

    // ── Annotation persistence (offset-based, survives DOM wipes) ──
    const ANN_KEY = 'scribe_annotations';

    function saveAnnotations() {
        const marks = transcriptArea.querySelectorAll('mark.ann');
        if (marks.length === 0) {
            localStorage.removeItem(ANN_KEY);
            return;
        }
        // Walk the DOM to compute character offsets for each mark
        const annotations = [];
        let offset = 0;
        function walk(node) {
            if (node.nodeType === Node.TEXT_NODE) {
                offset += node.textContent.length;
            } else if (node.nodeName === 'MARK' && node.classList.contains('ann')) {
                const start = offset;
                const text = node.textContent;
                offset += text.length;
                annotations.push({ start, end: offset, text });
            } else if (node.nodeName === 'BR') {
                offset += 1;
            } else {
                for (const child of node.childNodes) walk(child);
            }
        }
        walk(transcriptArea);
        localStorage.setItem(ANN_KEY, JSON.stringify(annotations));
    }

    function reapplyAnnotations() {
        const raw = localStorage.getItem(ANN_KEY);
        if (!raw) return;
        try {
            const annotations = JSON.parse(raw);
            if (!annotations.length) return;
            // Already has marks? Don't double-apply
            if (transcriptArea.querySelector('mark.ann')) return;

            const plainText = getPlainText();
            if (!plainText) return;

            // Rebuild HTML with marks inserted at stored offsets
            // Sort annotations by start offset (ascending)
            annotations.sort((a, b) => a.start - b.start);
            let html = '';
            let cursor = 0;
            for (const ann of annotations) {
                if (ann.start > cursor) {
                    html += escapeHtml(plainText.slice(cursor, ann.start));
                }
                html += '<mark class="ann">' + escapeHtml(plainText.slice(ann.start, ann.end)) + '</mark>';
                cursor = ann.end;
            }
            if (cursor < plainText.length) {
                html += escapeHtml(plainText.slice(cursor));
            }
            transcriptArea.innerHTML = html;
        } catch (e) {
            // Corrupt annotation data, ignore
        }
    }

    function escapeHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ── localStorage draft persistence ──
    const DRAFT_KEY = 'scribe_draft';
    const JOB_KEY = 'scribe_job_id';

    function saveDraft() {
        const html = transcriptArea.innerHTML;
        if (html) {
            localStorage.setItem(DRAFT_KEY, JSON.stringify({
                text: getPlainText(),
                html: html,
                jobId: currentJobId,
                timestamp: Date.now(),
            }));
            saveAnnotations();
        } else {
            localStorage.removeItem(DRAFT_KEY);
            localStorage.removeItem(ANN_KEY);
        }
    }

    function clearDraft() {
        localStorage.removeItem(DRAFT_KEY);
        localStorage.removeItem(JOB_KEY);
        localStorage.removeItem(ANN_KEY);
        currentJobId = null;
    }

    // ── Restore banner ──
    function acceptRestore() {
        document.getElementById('restoreBanner').classList.remove('active');
        saveBtn.disabled = false;
        // Text is already in textarea; just keep it
    }

    function dismissRestore() {
        document.getElementById('restoreBanner').classList.remove('active');
        transcriptArea.innerHTML = '';
        clearDraft();
        saveBtn.disabled = true;
    }

    // On page load: check for saved draft
    (function restoreFromStorage() {
        const raw = localStorage.getItem(DRAFT_KEY);
        if (!raw) return;
        try {
            const draft = JSON.parse(raw);
            if (draft.html || draft.text) {
                _annGuardActive = false; // pause guard during restore
                transcriptArea.innerHTML = draft.html || draft.text;
                // If HTML restore didn't include marks, try offset-based re-apply
                if (!transcriptArea.querySelector('mark.ann')) {
                    reapplyAnnotations();
                }
                _annGuardActive = true;
                document.getElementById('restoreBanner').classList.add('active');
                // If there was an active job, try to recover remaining segments
                if (draft.jobId) {
                    currentJobId = draft.jobId;
                    localStorage.setItem(JOB_KEY, draft.jobId);
                    recoverJob(draft.jobId);
                }
            }
        } catch (e) {
            // Ignore corrupt data
        }
    })();

    // Poll server for any segments we missed while disconnected
    async function recoverJob(jobId) {
        try {
            const res = await fetch('/job/' + jobId);
            if (!res.ok) return;
            const job = await res.json();

            if (job.status === 'done') {
                // Job already finished — do NOT overwrite content (user may have annotations)
                showStatusMessage('Recovered', 'Transcription completed while you were away');
                saveBtn.disabled = false;
            } else if (job.status === 'running') {
                // Job still running — update text from segments so far
                const text = job.segments.map(s => s.text).filter(Boolean).join(' ');
                if (text) setPlainText(text);
                saveDraft();
                showStatusMessage('Reconnected', 'Transcription still in progress...');
                pollJob(jobId);
            } else if (job.status === 'error') {
                showStatusMessage('Job failed', job.error || 'Unknown error');
            }
        } catch (e) {
            // Server not available yet; banner will stay, user can retry
        }
    }

    async function pollJob(jobId) {
        const poll = setInterval(async () => {
            try {
                const res = await fetch('/job/' + jobId);
                if (!res.ok) { clearInterval(poll); return; }
                const job = await res.json();

                if (job.status === 'done') {
                    clearInterval(poll);
                    // Only update text if user hasn't annotated yet
                    if (!transcriptArea.querySelector('mark.ann')) {
                        setPlainText(job.full_text);
                        saveDraft();
                    }
                    showStatusMessage('Done', 'Transcription complete');
                    saveBtn.disabled = false;
                } else if (job.status === 'error') {
                    clearInterval(poll);
                    showStatusMessage('Error', job.error || 'Unknown error');
                } else {
                    // Still running — only update if no annotations present
                    if (!transcriptArea.querySelector('mark.ann')) {
                        const text = job.segments.map(s => s.text).filter(Boolean).join(' ');
                        if (text) setPlainText(text);
                        saveDraft();
                    }
                    const lastSeg = job.segments[job.segments.length - 1];
                    const pct = lastSeg ? lastSeg.percent : 0;
                    showStatus('Transcribing...', `${job.segments.length} segments`, pct);
                }
            } catch (e) {
                // Connection lost again; keep polling
            }
        }, 3000);
    }

    // ── Save dialog (Issue #2) ──
    function openSaveModal() {
        const now = new Date();
        const ts = now.getFullYear().toString() +
            String(now.getMonth()+1).padStart(2,'0') +
            String(now.getDate()).padStart(2,'0') + '_' +
            String(now.getHours()).padStart(2,'0') +
            String(now.getMinutes()).padStart(2,'0') +
            String(now.getSeconds()).padStart(2,'0');
        saveFilenameInput.value = 'transcript_' + ts + '.txt';
        saveDirectoryInput.value = defaultSaveDir || '';
        saveModal.classList.add('active');
        saveFilenameInput.focus();
        saveFilenameInput.select();
    }

    function closeSaveModal() {
        saveModal.classList.remove('active');
    }

    async function confirmSave() {
        // Export annotated text (with [[LABEL: text]] markers) if annotations exist,
        // otherwise plain text
        const hasAnnotations = transcriptArea.querySelector('mark.ann');
        const text = hasAnnotations ? getAnnotatedText() : getPlainText();
        if (!text) return;

        const filename = saveFilenameInput.value.trim();
        const directory = saveDirectoryInput.value.trim();

        closeSaveModal();
        showStatus('Saving...', null, null);

        try {
            const res = await fetch('/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, filename, directory })
            });
            const result = await res.json();
            if (result.status === 'success') {
                showStatusMessage('Saved', result.path || result.file);
                clearDraft();
            } else {
                showStatusMessage('Save failed', result.error || 'Unknown error');
            }
        } catch (err) {
            showStatusMessage('Save failed', err.message);
        }
    }

    // Fetch default save dir on load
    (async function fetchSaveDir() {
        try {
            const res = await fetch('/save-dir');
            const data = await res.json();
            defaultSaveDir = data.directory || '';
        } catch (e) { /* server not up yet */ }
    })();

    // Auto-discover orphaned jobs (if we don't have a jobId from localStorage)
    (async function discoverOrphanedJobs() {
        if (currentJobId) return; // already tracking a job
        try {
            const res = await fetch('/jobs');
            if (!res.ok) return;
            const jobList = await res.json();
            // Find any running job
            const running = jobList.find(j => j.status === 'running');
            const done = jobList.find(j => j.status === 'done' && j.segment_count > 0);
            const target = running || done;
            if (!target) return;

            currentJobId = target.job_id;
            localStorage.setItem(JOB_KEY, target.job_id);
            showStatusMessage('Found orphaned job', target.status + ' (' + target.segment_count + ' segments)');

            if (running) {
                pollJob(running.job_id);
            } else if (done) {
                recoverJob(done.job_id);
            }
        } catch (e) { /* server not up */ }
    })();

    // Close modal on Escape or click outside
    saveModal.addEventListener('click', (e) => {
        if (e.target === saveModal) closeSaveModal();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && saveModal.classList.contains('active')) closeSaveModal();
    });

    // ── Status helpers (unchanged) ──
    function _mergeLabel(label, detail) {
        if (!detail || detail === label || label.includes(detail) || detail.includes(label)) return label;
        return label + ' \u2014 ' + detail;
    }

    function showStatus(label, detail, percent) {
        statusBar.classList.add('active');
        statusLabel.innerText = _mergeLabel(label, detail);
        if (percent === null) {
            progressFill.className = 'progress-fill indeterminate';
            statusPct.innerText = '';
        } else {
            progressFill.className = 'progress-fill';
            progressFill.style.width = percent + '%';
            statusPct.innerText = Math.round(percent) + '%';
        }
    }

    function hideStatus() {
        statusBar.classList.remove('active');
        progressFill.className = 'progress-fill';
        progressFill.style.width = '0%';
        statusPct.innerText = '';
        statusLabel.innerText = '';
    }

    function showStatusMessage(label, detail) {
        statusBar.classList.add('active');
        statusLabel.innerText = _mergeLabel(label, detail);
        progressFill.className = 'progress-fill';
        progressFill.style.width = '0%';
        statusPct.innerText = '';
    }

    // ── Server health check ──
    async function checkServer() {
        try {
            const res = await fetch('/', { method: 'HEAD' });
            serverStatus.className = "status-pill online";
            serverStatus.querySelector('span').innerText = "Bridge Online";
            setupOverlay.classList.add('hidden');
            recordBtn.disabled = false;
        } catch (err) {
            serverStatus.className = "status-pill offline";
            serverStatus.querySelector('span').innerText = "Bridge Offline";
            setupOverlay.classList.remove('hidden');
            recordBtn.disabled = true;
        }
    }
    let healthCheckId = setInterval(checkServer, 3000);
    checkServer();

    function pauseHealthCheck() { clearInterval(healthCheckId); }
    function resumeHealthCheck() { healthCheckId = setInterval(checkServer, 3000); }

    function copyCommand() {
        navigator.clipboard.writeText(document.getElementById('cmdCode').innerText);
        showStatusMessage('Command copied to clipboard');
    }

    // ── Recording ──
    recordBtn.addEventListener('click', () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            stopRecording();
        } else {
            startRecording();
        }
    });

    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                sendToLocalWhisper(audioBlob);
            };
            mediaRecorder.start();

            recordBtn.classList.add('recording');
            micIcon.style.display = 'none';
            stopIcon.style.display = 'block';
            showStatusMessage('Listening...');
            saveBtn.disabled = true;
        } catch (err) {
            alert("Mic access denied");
        }
    }

    function stopRecording() {
        mediaRecorder.stop();
        recordBtn.classList.remove('recording');
        micIcon.style.display = 'block';
        stopIcon.style.display = 'none';
        showStatus('Processing audio...', null, null);
    }

    let activeAbort = null;

    // ── Clear ──
    clearBtn.addEventListener('click', () => {
        transcriptArea.innerHTML = "";
        saveBtn.disabled = true;
        clearDraft();
        if (activeAbort) {
            activeAbort.abort();
            activeAbort = null;
            ytBtn.disabled = false;
            recordBtn.disabled = false;
            resumeHealthCheck();
            showStatusMessage('Transcription cancelled', 'Nothing saved');
        } else {
            hideStatus();
        }
    });

    // ── Save button → opens dialog ──
    saveBtn.addEventListener('click', () => {
        const text = getPlainText();
        if (!text) return;
        openSaveModal();
    });

    // ── YouTube transcription ──
    const ytUrl = document.getElementById('ytUrl');
    const ytBtn = document.getElementById('ytBtn');

    ytBtn.addEventListener('click', async () => {
        const url = ytUrl.value.trim();
        if (!url) return;
        ytBtn.disabled = true;
        recordBtn.disabled = true;
        pauseHealthCheck();
        showStatus('Connecting...', null, null);

        const abort = new AbortController();
        activeAbort = abort;

        let needsSep = !!getPlainText();
        let segmentCount = 0;

        try {
            const response = await fetch('/transcribe-youtube', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url }),
                signal: abort.signal,
            });

            if (!response.ok) {
                const errData = await response.json().catch(() => null);
                showStatusMessage('Error', errData?.error || `Server returned ${response.status}`);
                return;
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const parts = buffer.split('\n\n');
                buffer = parts.pop();

                for (const part of parts) {
                    let eventType = 'message';
                    let eventData = '';
                    for (const line of part.split('\n')) {
                        if (line.startsWith('event: ')) eventType = line.slice(7);
                        else if (line.startsWith('data: ')) eventData = line.slice(6);
                    }
                    if (!eventData) continue;

                    const data = JSON.parse(eventData);

                    if (eventType === 'job') {
                        // Server assigned a job ID — save it for reconnection
                        currentJobId = data.job_id;
                        localStorage.setItem(JOB_KEY, data.job_id);
                    } else if (eventType === 'progress') {
                        if (data.phase === 'download') {
                            const pct = data.percent != null ? data.percent : null;
                            const label = data.message && data.message.includes('Extracting') ? 'Extracting audio...' : 'Downloading audio...';
                            showStatus(label, null, pct);
                        } else if (data.phase === 'transcribe') {
                            showStatus('Transcribing...', data.message || '', null);
                        } else if (data.phase === 'save') {
                            showStatus('Transcript complete', null, 100);
                        }
                    } else if (eventType === 'segment') {
                        showStatus('Transcribing...', `${data.start}s \u2013 ${data.end}s`, data.percent);
                        if (needsSep) {
                            appendText('\n\n');
                            needsSep = false;
                        }
                        appendText((segmentCount > 0 ? ' ' : '') + data.text);
                        segmentCount++;
                        // Persist draft after every segment
                        saveDraft();
                    } else if (eventType === 'done') {
                        showStatusMessage('Done', 'Ready to save');
                        saveBtn.disabled = false;
                        saveDraft();
                    } else if (eventType === 'error') {
                        showStatusMessage('Error', data.message);
                    }
                }
            }
        } catch (err) {
            if (err.name === 'AbortError') return;
            console.error('YouTube transcription error:', err);

            // Connection dropped — try to recover via job polling
            if (currentJobId) {
                showStatusMessage('Connection lost', 'Recovering...');
                pollJob(currentJobId);
            } else {
                showStatusMessage('Connection error', err.message || 'unknown');
            }
        } finally {
            activeAbort = null;
            ytBtn.disabled = false;
            recordBtn.disabled = false;
            resumeHealthCheck();
        }
    });

    ytUrl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') ytBtn.click();
    });

    async function sendToLocalWhisper(blob) {
        const formData = new FormData();
        formData.append('file', blob, 'recording.webm');
        try {
            const response = await fetch('/transcribe', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            appendText((getPlainText() ? "\n\n" : "") + result.text);
            showStatusMessage('Transcribed');
            saveBtn.disabled = false;
            saveDraft();
        } catch (err) {
            showStatusMessage('Connection lost during processing');
        }
    }

    // ── Annotation system (Issue #3) ──
    const annBtn = document.getElementById('annBtn');
    let annotateMode = false;

    annBtn.addEventListener('click', () => {
        annotateMode = !annotateMode;
        annBtn.classList.toggle('ann-active', annotateMode);
    });

    // In annotate mode, any text selection automatically gets highlighted
    transcriptArea.addEventListener('mouseup', () => {
        if (!annotateMode) return;
        const sel = window.getSelection();
        if (!sel || sel.isCollapsed || sel.rangeCount === 0) return;
        const range = sel.getRangeAt(0);
        if (!transcriptArea.contains(range.commonAncestorContainer)) return;

        // If selection is inside an existing mark, unwrap it instead (toggle)
        const parent = range.commonAncestorContainer;
        const existingMark = parent.nodeType === Node.TEXT_NODE
            ? parent.parentElement.closest('mark.ann')
            : parent.closest && parent.closest('mark.ann');
        if (existingMark && range.toString().trim() === existingMark.textContent.trim()) {
            const p = existingMark.parentNode;
            while (existingMark.firstChild) p.insertBefore(existingMark.firstChild, existingMark);
            p.removeChild(existingMark);
            p.normalize();
            saveDraft();
            return;
        }

        // Wrap selection in a highlight mark
        const mark = document.createElement('mark');
        mark.className = 'ann';
        try {
            range.surroundContents(mark);
        } catch (e) {
            const fragment = range.extractContents();
            mark.appendChild(fragment);
            range.insertNode(mark);
        }
        sel.removeAllRanges();
        saveDraft();
    });

    // Click an existing highlight to remove it (works in any mode)
    transcriptArea.addEventListener('dblclick', (e) => {
        const mark = e.target.closest('mark.ann');
        if (!mark) return;
        e.preventDefault();
        const parent = mark.parentNode;
        while (mark.firstChild) parent.insertBefore(mark.firstChild, mark);
        parent.removeChild(mark);
        parent.normalize();
        saveDraft();
    });

    // ── Guard: watch for unexpected annotation removal ──
    let _annGuardActive = true;
    const _annObserver = new MutationObserver(() => {
        if (!_annGuardActive) return;
        // If we had annotations in localStorage but none in DOM, re-apply
        const storedAnns = localStorage.getItem(ANN_KEY);
        if (storedAnns && !transcriptArea.querySelector('mark.ann')) {
            try {
                const anns = JSON.parse(storedAnns);
                if (anns.length > 0) {
                    _annGuardActive = false; // prevent re-entrant
                    reapplyAnnotations();
                    _annGuardActive = true;
                }
            } catch (e) {}
        }
    });
    _annObserver.observe(transcriptArea, { childList: true, subtree: true });

    // ── Export annotated text for LLM consumption ──
    function getAnnotatedText() {
        let output = '';
        function walk(node) {
            if (node.nodeType === Node.TEXT_NODE) {
                output += node.textContent;
            } else if (node.nodeName === 'MARK' && node.classList.contains('ann')) {
                output += `[[highlight: ${node.textContent}]]`;
            } else if (node.nodeName === 'BR') {
                output += '\n';
            } else {
                for (const child of node.childNodes) walk(child);
            }
        }
        walk(transcriptArea);
        return output;
    }
</script>
