<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HUFD Topology: Surah 15 (2D Field Analysis)</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; background-color: #0a0a0c; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #chart-container { width: 95vw; height: 80vh; margin: 40px auto; padding: 20px; background: #111115; border: 1px solid #222; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        h1 { text-align: center; color: #00f2ff; text-transform: uppercase; letter-spacing: 3px; font-weight: 300; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 30px; }
        .axis-label { font-size: 12px; fill: #666; text-transform: uppercase; }
        .line { fill: none; stroke: #00f2ff; stroke-width: 2.5; filter: drop-shadow(0 0 5px rgba(0, 242, 255, 0.5)); }
        .area { fill: url(#area-gradient); opacity: 0.2; }
        .dot { stroke-width: 2; cursor: pointer; transition: r 0.2s; }
        .dot:hover { r: 8; }
        .tooltip { position: absolute; padding: 12px; background: rgba(0,0,0,0.9); border: 1px solid #00f2ff; border-radius: 4px; pointer-events: none; font-size: 0.85rem; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.8); line-height: 1.5; }
        .arabic { font-size: 1.4rem; direction: rtl; display: block; margin-bottom: 5px; color: #fff; }
        .legend { display: flex; justify-content: center; gap: 25px; margin-top: 20px; font-size: 0.8rem; color: #aaa; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 12px; height: 12px; border-radius: 50%; }
    </style>
</head>
<body>
    <h1>HUFD Manifold Topology</h1>
    <div class="subtitle">Linguistic Field Analysis: Surah 15 (Verses 28–33) | SU(2) Path-Ordered Holonomy</div>
    
    <div id="chart-container">
        <svg id="chart"></svg>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-color" style="background: #ff3333"></div> Singular Perturbation (κ > 2.8)</div>
        <div class="legend-item"><div class="legend-color" style="background: #ffcc00"></div> High Tension Transition</div>
        <div class="legend-item"><div class="legend-color" style="background: #00ff88"></div> Holonomic Stability (κ → 0)</div>
    </div>

    <script>
        const data = [
          {"loc": "28:0", "text": "وإذ", "curvature": 2.8607},
          {"loc": "28:1", "text": "قال", "curvature": 2.2970},
          {"loc": "28:2", "text": "ربك", "curvature": 2.4266},
          {"loc": "28:3", "text": "للملـئكة", "curvature": 2.4266},
          {"loc": "28:4", "text": "إنى", "curvature": 2.8607},
          {"loc": "28:5", "text": "خـلق", "curvature": 2.8607},
          {"loc": "28:6", "text": "بشرا", "curvature": 2.8607},
          {"loc": "28:7", "text": "من", "curvature": 2.8607},
          {"loc": "28:8", "text": "صلصـل", "curvature": 2.8607},
          {"loc": "28:9", "text": "من", "curvature": 2.8608},
          {"loc": "28:10", "text": "حمإ", "curvature": 2.8608},
          {"loc": "28:11", "text": "مسنون", "curvature": 2.8608},
          {"loc": "29:0", "text": "فإذا", "curvature": 2.8608},
          {"loc": "29:1", "text": "سويته", "curvature": 2.3514},
          {"loc": "29:2", "text": "ونفخت", "curvature": 2.3268},
          {"loc": "29:3", "text": "فيه", "curvature": 2.3268},
          {"loc": "29:4", "text": "من", "curvature": 3.0000},
          {"loc": "29:5", "text": "روحى", "curvature": 2.8608},
          {"loc": "29:6", "text": "فقعوا", "curvature": 2.8608},
          {"loc": "29:7", "text": "له", "curvature": 2.8608},
          {"loc": "29:8", "text": "سـجدين", "curvature": 2.8608},
          {"loc": "30:0", "text": "فسجد", "curvature": 2.8608},
          {"loc": "30:1", "text": "ٱلملـئكة", "curvature": 2.8608},
          {"loc": "30:2", "text": "كلهم", "curvature": 2.8607},
          {"loc": "30:3", "text": "أجمعون", "curvature": 2.8607},
          {"loc": "31:0", "text": "إلا", "curvature": 2.8607},
          {"loc": "31:1", "text": "إبليس", "curvature": 2.8607},
          {"loc": "31:2", "text": "أبى", "curvature": 2.4691},
          {"loc": "31:3", "text": "أن", "curvature": 2.4691},
          {"loc": "31:4", "text": "يكون", "curvature": 2.2970},
          {"loc": "31:5", "text": "مع", "curvature": 2.2970},
          {"loc": "31:6", "text": "ٱلسـجدين", "curvature": 2.2970},
          {"loc": "32:0", "text": "قال", "curvature": 2.2970},
          {"loc": "32:1", "text": "يـإبلس", "curvature": 2.2970},
          {"loc": "32:2", "text": "ما", "curvature": 2.2970},
          {"loc": "32:3", "text": "لك", "curvature": 3.0000},
          {"loc": "32:4", "text": "ألا", "curvature": 3.0000},
          {"loc": "32:5", "text": "تكون", "curvature": 2.2971},
          {"loc": "32:6", "text": "مع", "curvature": 2.2971},
          {"loc": "32:7", "text": "ٱلسـجدين", "curvature": 2.2971},
          {"loc": "33:0", "text": "قال", "curvature": 2.2970},
          {"loc": "33:1", "text": "لم", "curvature": 2.2970},
          {"loc": "33:2", "text": "أكُن", "curvature": 2.3080},
          {"loc": "33:3", "text": "لأَسجد", "curvature": 2.3606},
          {"loc": "33:4", "text": "لبشر", "curvature": 2.3606},
          {"loc": "33:5", "text": "خـلقته", "curvature": 2.2971},
          {"loc": "33:6", "text": "من", "curvature": 2.2971},
          {"loc": "33:7", "text": "صلصـل", "curvature": 2.4691},
          {"loc": "33:8", "text": "من", "curvature": 2.8608},
          {"loc": "33:9", "text": "حمإ", "curvature": 2.8608},
          {"loc": "33:10", "text": "مسنون", "curvature": 2.8608}
        ];

        const margin = {top: 40, right: 40, bottom: 80, left: 60};
        const width = document.getElementById('chart-container').offsetWidth - margin.left - margin.right;
        const height = document.getElementById('chart-container').offsetHeight - margin.top - margin.bottom;

        const svg = d3.select("#chart")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
          .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        // Scales
        const x = d3.scaleLinear()
            .domain([0, data.length - 1])
            .range([0, width]);

        const y = d3.scaleLinear()
            .domain([0, 3.14159]) // Curvature in radians (0 to pi)
            .range([height, 0]);

        // Gradients
        const defs = svg.append("defs");
        
        const areaGradient = defs.append("linearGradient")
            .attr("id", "area-gradient")
            .attr("x1", "0%").attr("y1", "0%")
            .attr("x2", "0%").attr("y2", "100%");
        areaGradient.append("stop").attr("offset", "0%").attr("stop-color", "#00f2ff").attr("stop-opacity", 0.6);
        areaGradient.append("stop").attr("offset", "100%").attr("stop-color", "#00f2ff").attr("stop-opacity", 0);

        // Grid lines
        svg.append("g")			
            .attr("class", "grid")
            .attr("stroke", "#222")
            .attr("stroke-opacity", 0.5)
            .call(d3.axisLeft(y).ticks(5).tickSize(-width).tickFormat(""));

        // Axis
        svg.append("g")
            .attr("transform", `translate(0,${height})`)
            .call(d3.axisBottom(x).ticks(data.length).tickFormat(i => data[i] ? data[i].loc : ""))
            .attr("color", "#444")
            .selectAll("text")
            .style("text-anchor", "end")
            .attr("dx", "-.8em")
            .attr("dy", ".15em")
            .attr("transform", "rotate(-45)");

        svg.append("g")
            .call(d3.axisLeft(y).ticks(5))
            .attr("color", "#444");

        // Line and Area
        const line = d3.line()
            .x((d, i) => x(i))
            .y(d => y(d.curvature))
            .curve(d3.curveMonotoneX);

        const area = d3.area()
            .x((d, i) => x(i))
            .y0(height)
            .y1(d => y(d.curvature))
            .curve(d3.curveMonotoneX);

        svg.append("path")
            .datum(data)
            .attr("class", "area")
            .attr("d", area);

        svg.append("path")
            .datum(data)
            .attr("class", "line")
            .attr("d", line);

        // Tooltip
        const tooltip = d3.select("body").append("div")
            .attr("class", "tooltip")
            .style("opacity", 0);

        // Dots
        svg.selectAll(".dot")
            .data(data)
          .enter().append("circle")
            .attr("class", "dot")
            .attr("cx", (d, i) => x(i))
            .attr("cy", d => y(d.curvature))
            .attr("r", 5)
            .attr("fill", d => {
                if (d.curvature > 2.8) return "#ff3333";
                if (d.curvature > 2.0) return "#ffcc00";
                return "#00ff88";
            })
            .attr("stroke", "#0a0a0c")
            .on("mouseover", function(event, d) {
                tooltip.transition().duration(200).style("opacity", .9);
                tooltip.html(`
                    <span class="arabic">${d.text}</span>
                    <strong>Coordinate:</strong> ${d.loc}<br/>
                    <strong>Curvature (κ):</strong> ${d.curvature.toFixed(4)} rad<br/>
                    <strong>State:</strong> ${d.curvature > 2.8 ? 'SINGULARITY' : 'FIELD FLOW'}
                `)
                .style("left", (event.pageX + 15) + "px")
                .style("top", (event.pageY - 28) + "px");
            })
            .on("mouseout", function() {
                tooltip.transition().duration(500).style("opacity", 0);
            });

        // Vertical markers for text
        svg.selectAll(".word-label")
            .data(data)
          .enter().append("text")
            .attr("x", (d, i) => x(i))
            .attr("y", d => y(d.curvature) - 15)
            .attr("text-anchor", "middle")
            .attr("fill", "#aaa")
            .style("font-size", "10px")
            .text(d => d.text);

    </script>
</body>
</html>
