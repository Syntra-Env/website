<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Portal</h1>
        <p class="subtitle">A collection of tools I've built</p>
    </header>

    <main class="app-grid">
        <!-- Breath App Card -->
        <a href="apps/breath/index.html" class="app-card">
            <div class="app-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="9"/>
                    <path d="M12 8v4M12 16v.01"/>
                </svg>
            </div>
            <div class="app-info">
                <h2>Breath</h2>
                <p>Track your breathing patterns with inhale, hold, exhale, and retention phases. Visualize your progress over time.</p>
            </div>
            <span class="app-arrow">&rarr;</span>
        </a>

        <!-- Placeholder for future apps -->
        <div class="app-card placeholder">
            <div class="app-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
            </div>
            <div class="app-info">
                <h2>More coming soon</h2>
                <p>New apps will appear here as they're created.</p>
            </div>
        </div>
    </main>

    <footer>
        <p>Built with care</p>
    </footer>
</body>
</html>
