name: Upload to Zenodo (Draft)

on:
  push:
    branches: [master]
    paths:
      - '**.html'
      - '**.css'
  workflow_dispatch:
    inputs:
      force_new_version:
        description: 'Force create new version'
        required: false
        default: 'false'
      use_sandbox:
        description: 'Use sandbox.zenodo.org'
        required: false
        default: 'false'

env:
  ZENODO_DEPOSIT_FILE: .zenodo_deposit_id

jobs:
  upload-to-zenodo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Upload to Zenodo
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          # Retry function for API calls
          retry_curl() {
            local max_attempts=5
            local delay=10
            local attempt=1
            local response
            local status_code
            
            while [ $attempt -le $max_attempts ]; do
              echo "Attempt $attempt/$max_attempts..."
              response=$(curl -s -w "\n%{http_code}" "$@")
              status_code=$(echo "$response" | tail -n1)
              
              if [ "$status_code" = "200" ] || [ "$status_code" = "201" ]; then
                echo "$response" | sed '$d'
                return 0
              elif [ "$status_code" = "500" ] || [ "$status_code" = "502" ] || [ "$status_code" = "503" ]; then
                echo "Got HTTP $status_code, retrying in ${delay}s..."
                sleep $delay
                attempt=$((attempt+1))
                delay=$((delay*2))
              else
                echo "$response" | sed '$d'
                return 1
              fi
            done
            
            echo "Failed after $max_attempts attempts"
            return 1
          }
          
          # Determine Zenodo URL
          if [ "${{ github.event.inputs.use_sandbox }}" = "true" ] || [ "${{ secrets.ZENODO_SANDBOX }}" = "true" ]; then
            ZENODO_URL="https://sandbox.zenodo.org"
          else
            ZENODO_URL="https://zenodo.org"
          fi
          
          echo "Using Zenodo: $ZENODO_URL"
          
          # Function to create deposit
          create_deposit() {
            curl -s -X POST -H "Authorization: Bearer $ZENODO_TOKEN" \
              "$ZENODO_URL/api/deposit/depositions"
          }
          
          # Function to check deposit status
          check_deposit() {
            curl -s -H "Authorization: Bearer $ZENODO_TOKEN" \
              "$ZENODO_URL/api/deposit/depositions/$1"
          }
          
          # Get or create deposit
          if [ -f "${{ env.ZENODO_DEPOSIT_FILE }}" ] && [ "${{ github.event.inputs.force_new_version }}" != "true" ]; then
            DEPOSIT_ID=$(cat "${{ env.ZENODO_DEPOSIT_FILE }}")
            echo "Using existing deposit: $DEPOSIT_ID"
            
            STATUS_RESPONSE=$(retry_curl "$ZENODO_URL/api/deposit/depositions/$DEPOSIT_ID" | head -n-1)
            echo "Status Response: $STATUS_RESPONSE"
            STATUS=$(echo "$STATUS_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('state','unsubmitted'))")
            
            if [ "$STATUS" = "done" ]; then
              echo "Deposit is published, creating new version..."
              retry_curl -X POST -H "Authorization: Bearer $ZENODO_TOKEN" \
                "$ZENODO_URL/api/deposit/depositions/$DEPOSIT_ID/actions/newversion" > /dev/null
              sleep 3
              NEW_VERSION=$(check_deposit "$DEPOSIT_ID" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('links',{}).get('latest_draft','NO_LINK'))")
              DEPOSIT_ID=$(echo "$NEW_VERSION" | grep -o '[0-9]\+' | tail -1)
              echo "New version ID: $DEPOSIT_ID"
            fi
          else
            echo "Creating new deposit..."
            NEW_DEP=$(retry_curl -X POST -H "Authorization: Bearer $ZENODO_TOKEN" \
              "$ZENODO_URL/api/deposit/depositions")
            echo "API Response: $NEW_DEP"
            DEPOSIT_ID=$(echo "$NEW_DEP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id', d.get('error', 'NO_ID')))")
            if [ "$DEPOSIT_ID" = "NO_ID" ]; then
              echo "ERROR: Failed to create deposit"
              echo "Response: $NEW_DEP"
              exit 1
            fi
            echo "New deposit ID: $DEPOSIT_ID"
          fi
          
          # Clear existing files
          echo "Clearing old files..."
          FILE_IDS=$(curl -s -H "Authorization: Bearer $ZENODO_TOKEN" \
            "$ZENODO_URL/api/deposit/depositions/$DEPOSIT_ID/files" | \
            python3 -c "import sys,json; [print(f['id']) for f in json.load(sys.stdin)]")
          for FILE_ID in $FILE_IDS; do
            retry_curl -X DELETE -H "Authorization: Bearer $ZENODO_TOKEN" \
              "$ZENODO_URL/api/deposit/depositions/$DEPOSIT_ID/files/$FILE_ID" > /dev/null
          done
          
          # Update metadata
          echo "Updating metadata..."
          retry_curl -X PUT \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "metadata": {
                "title": "Syntra Research Documentation",
                "upload_type": "publication",
                "publication_type": "report",
                "description": "Research documentation on Quranic analysis, mathematical frameworks, and theological interpretation systems. Auto-uploaded draft. Do not publish without review.",
                "creators": [{"name": "Syntra-Env", "affiliation": "Independent"}],
                "keywords": ["Quran", "Arabic NLP", "Machine Learning", "Research", "Kalima"],
                "license": "cc-by-4.0"
              }
            }' \
            "$ZENODO_URL/api/deposit/depositions/$DEPOSIT_ID" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Updated metadata:', d.get('title',''))"
          
          # Upload all HTML files from research/ directory
          echo "Uploading HTML files from research/..."
          find research -name "*.html" -type f | while read file; do
            echo "  Uploading: $file"
            retry_curl -X POST \
              -H "Authorization: Bearer $ZENODO_TOKEN" \
              -F "file=@$file" \
              "$ZENODO_URL/api/deposit/depositions/$DEPOSIT_ID/files" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print('    ->', d.get('filename',''))"
          done
          
          # Upload CSS
          if [ -f "styles.css" ]; then
            echo "  Uploading: styles.css"
            retry_curl -X POST \
              -H "Authorization: Bearer $ZENODO_TOKEN" \
              -F "file=@styles.css" \
              "$ZENODO_URL/api/deposit/depositions/$DEPOSIT_ID/files" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print('    ->', d.get('filename',''))"
          fi
          
          # Save deposit ID
          echo "$DEPOSIT_ID" > "${{ env.ZENODO_DEPOSIT_FILE }}"
          echo "Deposit ID saved to ${{ env.ZENODO_DEPOSIT_FILE }}"
          
          echo ""
          echo "=== UPLOAD COMPLETE ==="
          echo "Deposit ID: $DEPOSIT_ID"
          echo "Draft URL: $ZENODO_URL/deposit/$DEPOSIT_ID"
          echo ""
          echo "NOTE: Deposit ID is saved in .zenodo_deposit_id file."
          echo "Delete this file and re-run to create a new deposit."

      - name: Commit deposit ID
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Zenodo deposit ID"
          file_pattern: ${{ env.ZENODO_DEPOSIT_FILE }}
          skip_dirty_check: false
